version: "2"
sql:
  - engine: "postgresql"
    queries: "db/sqlc/query.sql"
    schema:
      - "db/migrations/000001_create_users.sql"
      - "db/migrations/000002_add_auth_fields.sql"
    gen:
      go:
        package: "sqlcdb"
        out: "db/sqlc"
        emit_json_tags: true
        emit_params_struct_pointers: false
        emit_result_struct_pointers: false
